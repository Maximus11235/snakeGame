<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="style.css">
    <title>SNAKE.io</title>
</head>
<body>
    <div id="game-container">
        <div id="scoreboard">
            <span>Pontuação: <strong id="score">0</strong></span>
        </div>
        
        <!-- O "tabuleiro" é um elemento único -->
        <canvas id="gameCanvas" width="800" height="800"></canvas>
        
        <!-- Tela de Fim de Jogo (Oculta por padrão) -->
        <div id="telaGameOver">
            <h2>Fim de Jogo!</h2>
            <button id="btnRestart" onclick="reiniciarJogo()">Reiniciar</button>
        </div>
        
        <!-- <div id="status">Conectando ao servidor...</div> -->
    </div>

    <script src="script.js"></script>
</body>
</html>
